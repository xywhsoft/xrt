name: HTTP Util Fuzz

on:
  push:
    paths:
      - ".github/workflows/http-util-fuzz.yml"
      - "build_test_http_util_fuzz.sh"
      - "build_test_http_util_fuzz_corpus.sh"
      - "build_test_http_util_fuzz_sanitize.sh"
      - "build_test_http_util_libfuzzer.sh"
      - "build_test_xurl_core.sh"
      - "build_test_modern.sh"
      - "dev/FUZZ_HTTP_UTIL.md"
      - "dev/fuzz_http_util_core.c"
      - "dev/fuzz/http_util_corpus/**"
      - "test.c"
      - "test/test_xurl.h"
      - "dev/XRT_ROADMAP_NEXT.md"
      - "lib/xurl.h"
      - "lib/xhttp_util.h"
      - "xrt.c"
      - "xrt.h"
  pull_request:
    paths:
      - ".github/workflows/http-util-fuzz.yml"
      - "build_test_http_util_fuzz.sh"
      - "build_test_http_util_fuzz_corpus.sh"
      - "build_test_http_util_fuzz_sanitize.sh"
      - "build_test_http_util_libfuzzer.sh"
      - "build_test_xurl_core.sh"
      - "build_test_modern.sh"
      - "dev/FUZZ_HTTP_UTIL.md"
      - "dev/fuzz_http_util_core.c"
      - "dev/fuzz/http_util_corpus/**"
      - "test.c"
      - "test/test_xurl.h"
      - "dev/XRT_ROADMAP_NEXT.md"
      - "lib/xurl.h"
      - "lib/xhttp_util.h"
      - "xrt.c"
      - "xrt.h"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  http-util-fuzz-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          gcc --version | head -n 1
          clang --version | head -n 1

      - name: Run tracked corpus lane
        run: sh ./build_test_http_util_fuzz_corpus.sh

      - name: Run ASan and UBSan corpus lane
        run: CC=clang sh ./build_test_http_util_fuzz_sanitize.sh

      - name: Build libFuzzer target
        run: CC=clang sh ./build_test_http_util_libfuzzer.sh

      - name: Run focused URL and HTTP util regression
        run: sh ./build_test_xurl_core.sh

      - name: Run modern integration flow
        run: sh ./build_test_modern.sh
