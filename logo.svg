<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#1a1a2e" rx="20"/>
  
  <!-- 外圈光环 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gradient1)" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#gradient1)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 中心六边形 -->
  <polygon points="100,35 135,57.5 135,102.5 100,125 65,102.5 65,57.5" 
           fill="none" stroke="url(#gradient2)" stroke-width="3"/>
  
  <!-- X 形状 - 代表 XRT 的 X，体现快速、交叉的概念 -->
  <path d="M 70 70 L 130 130 M 130 70 L 70 130" 
        stroke="url(#gradient3)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 内部装饰线条 - 体现运行时(Runtime)的动态感 -->
  <line x1="50" y1="100" x2="75" y2="100" stroke="#00d4ff" stroke-width="2" opacity="0.6">
    <animate attributeName="x1" values="50;60;50" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="125" y1="100" x2="150" y2="100" stroke="#00d4ff" stroke-width="2" opacity="0.6">
    <animate attributeName="x2" values="150;140;150" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="50" x2="100" y2="75" stroke="#ff6b6b" stroke-width="2" opacity="0.6">
    <animate attributeName="y1" values="50;60;50" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="125" x2="100" y2="150" stroke="#ff6b6b" stroke-width="2" opacity="0.6">
    <animate attributeName="y2" values="150;140;150" dur="2.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- 文字 XRT -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="url(#gradient4)" text-anchor="middle">XRT</text>
  
  <!-- 副标题 -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="10" 
        fill="#a0a0a0" text-anchor="middle" letter-spacing="2">RUNTIME LIBRARY</text>
  
  <!-- 渐变定义 -->
  <defs>
    <!-- 蓝色到青色渐变 -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- 紫色到蓝色渐变 -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 青色到红色渐变 - X 的颜色 -->
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    
    <!-- 文字渐变 -->
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
